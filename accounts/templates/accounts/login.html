{% extends "base.html" %}

{% block title %}Log in - Game Store{% endblock %}

{% block content %}
  <h1 class="mb-4">Log in</h1>

  <form method="post" class="col-md-4">
    {% csrf_token %}   <!-- CSRF protection is required for every POST form -->
    {{ form.as_p }}    <!-- username and password fields, with Django's validation -->
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>

  <p class="mt-3">No account? <a href="{% url 'accounts:register' %}">Register here</a>.</p>
{% endblock %}
