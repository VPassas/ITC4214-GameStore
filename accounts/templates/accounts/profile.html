{% extends "base.html" %}

{% block title %}My Profile - Game Store{% endblock %}

{% block content %}
  <h1 class="mb-4">My Profile</h1>

  <p>Username: <strong>{{ user.username }}</strong></p>

  <form method="post" class="col-md-5">
    {% csrf_token %}
    {{ form.as_p }} <!-- prepopulated form fields for first name, last name, and email -->
    <button type="submit" class="btn btn-primary">Save changes</button>
  </form>
{% endblock %}
