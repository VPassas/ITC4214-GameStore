{% extends "base.html" %}

{% block title %}Register - Game Store{% endblock %}

{% block content %}
  <h1 class="mb-4">Create an account</h1>

  <form method="post" class="col-md-4">
    {% csrf_token %}   <!-- CSRF protection is required for every POST form -->
    {{ form.as_p }}    <!-- username and password fields, with Django's validation -->
    <button type="submit" class="btn btn-primary">Register</button>
  </form>

  <p class="mt-3">Already have an account? <a href="{% url 'accounts:login' %}">Log in</a>.</p>
{% endblock %}
